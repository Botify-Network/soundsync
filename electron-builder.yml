appId: com.scautosync.app
productName: SoundCloud Auto Sync
directories:
  output: dist
files:
  - "**/*"
  - "!dist"
extraResources:
  - from: resources/
    to: ./
    filter:
      - "*.exe"
win:
  target: nsis
  icon: assets/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: assets/icon.ico
publish:
  provider: github
  owner: JG2547
  repo: sc-auto-downloader
