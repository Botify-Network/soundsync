appId: com.botify.soundsync
productName: SoundSync
directories:
  output: dist
files:
  - "**/*"
  - "!dist"
extraResources:
  - from: resources/
    to: ./
    filter:
      - "*.exe"
win:
  target: nsis
  icon: assets/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: assets/icon.ico
  shortcutName: SoundSync
publish:
  provider: github
  owner: Botify-Network
  repo: soundsync
